server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Promtail receives Docker container name like "/api", we strip the leading slash.
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: service
      # Container logs live under /var/lib/docker/containers/<container_id>/*.log
      - source_labels: ["__meta_docker_container_id"]
        replacement: /var/lib/docker/containers/$1/*.log
        target_label: __path__
    pipeline_stages:
      - docker: {}

