# AI Incident Manager - Production Docker Compose
# Production-ready configuration with service networking and proper dependencies
# Usage: docker-compose -f docker-compose.production.yml up --build

version: '3.8'

networks:
  ai-incident-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

services:
  # PostgreSQL database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-incident-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: incidentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
      # Enable pgvector extension
      POSTGRES_INITDB_ARGS: "--auth-host=md5 -c 'CREATE EXTENSION IF NOT EXISTS vector;'"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - ai-incident-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d incidentdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Ollama AI service for embeddings and analysis
  ollama:
    image: ollama/ollama:latest
    container_name: ai-incident-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=${OLLAMA_MODELS:-tinyllama,llama2}
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - ai-incident-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Backend API service (Go application)
  backend:
    build:
      context: .
      dockerfile: cmd/server/Dockerfile
    container_name: ai-incident-api
    restart: unless-stopped
    environment:
      # Database configuration (uses service names)
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_DBNAME: incidentdb
      DATABASE_SSLMODE: disable
      
      # AI service configuration (uses service names)
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-tinyllama}
      
      # Observability configuration (uses service names)
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      
      # Server configuration
      GIN_MODE: release
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVER_PORT: 8081
      
      # Security
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8081}
      API_RATE_LIMIT: ${API_RATE_LIMIT:-100}
      
      # Grafana configuration
      GRAFANA_URL: http://grafana:3001
      GRAFANA_API_KEY: ${GRAFANA_API_KEY:-}
      GRAFANA_ANNOTATIONS_ENABLED: "false"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - ai-incident-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Frontend Next.js application
  frontend:
    build:
      context: ./web
      dockerfile: web/Dockerfile
    container_name: ai-incident-frontend
    restart: unless-stopped
    environment:
      # API communication (uses service names)
      NEXT_PUBLIC_API_URL: http://backend:8081
      BACKEND_INTERNAL_URL: http://backend:8081
      
      # Grafana configuration
      NEXT_PUBLIC_GRAFANA_DASHBOARD_URL: http://grafana:3001
      
      # Next.js configuration
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      
      # Performance
      NEXT_PUBLIC_API_RATE_LIMIT: ${API_RATE_LIMIT:-100}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-incident-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.125'

  # Prometheus metrics collection
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: ai-incident-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ai-incident-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.125'

  # Loki log aggregation
  loki:
    image: grafana/loki:2.8.0
    container_name: ai-incident-loki
    restart: unless-stopped
    command:
      - "--config.file=/etc/loki/config.yaml"
    volumes:
      - ./configs/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/var/lib/loki
    ports:
      - "3100:3100"
    networks:
      - ai-incident-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.125'

  # Grafana visualization
  grafana:
    image: grafana/grafana:10.0.0
    container_name: ai-incident-grafana
    restart: unless-stopped
    environment:
      # Security
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}
      GF_SERVER_ROOT_URL: "http://grafana:3001"
      
      # Database configuration
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres
      GF_DATABASE_PORT: 5432
      GF_DATABASE_USER: postgres
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      GF_DATABASE_NAME: incidentdb
      GF_DATABASE_SSL_MODE: disable
      
      # Data sources
      GF_PROMETHEUS_URL: http://prometheus:9090
      GF_PROMETHEUS_ACCESS_MODE: proxy
      
      # Default dashboards
      GF_DASHBOARD_PROVIDERS: "default"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD: "incident-overview"
      
      # Performance
      GF_LOG_LEVEL: ${GRAFANA_LOG_LEVEL:-info}
      GF_LOG_MODE: console
      
      # Session configuration
      GF_SESSION_PROVIDER: database
      GF_SESSION_PROVIDER_CONFIG: "session_type=postgres;host=postgres;port=5432;user=postgres;password=${POSTGRES_PASSWORD:-postgres};dbname=incidentdb;sslmode=disable"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ai-incident-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.125'

  # Model initialization service (optional)
  model-init:
    image: ollama/ollama:latest
    container_name: ai-incident-model-init
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ai-incident-network
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST: http://ollama:11434
      - OLLAMA_MODELS: ${OLLAMA_MODELS:-tinyllama,llama2}
    command: >
      sh -c "
        echo 'Waiting for Ollama to be ready...';
        ollama list;
        echo 'Pulling TinyLlama model...';
        ollama pull tinyllama;
        echo 'Pulling Llama2 model...';
        ollama pull llama2;
        echo 'Model initialization complete';
        ollama list;
      "
    restart: "no"

# Persistent volumes for data persistence
volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
